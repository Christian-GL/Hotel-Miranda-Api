service: Hotel-Miranda-API
plugins:
  - serverless-dotenv-plugin
package:
  patterns:
    - "!./**"
    - "package.json"
    - "node_modules/**"
    - "dist/**"
    - "data/**"
    - "public/**"
    # EXCLUIR cachés y el paquete de test pesado:
    - "!node_modules/mongodb-memory-server/**"
    - "!node_modules/**/.cache/**"
    - "!.cache/**"
provider:
  name: aws
  region: eu-west-3
  runtime: nodejs20.x
functions:
  app:
    handler: dist/index.handler
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true